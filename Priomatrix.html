<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aufgabenplanung</title>
    
    <!-- Tailwind CSS laden -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM laden -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel laden (übersetzt den React-Code im Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- Icons als einfache SVG-Komponenten ---
        const IconCheckCircle2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        );
        const IconCircle = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle></svg>
        );
        const IconPlus = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );
        const IconTrash2 = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
        );
        const IconCalendarDays = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>
        );
        const IconArrowLeft = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        );
        const IconImage = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        );
        const IconX = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        );

        // --- Logik aus App.jsx ---
        const getISOWeek = (date) => {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        };

        const resizeImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 500;
                        const MAX_HEIGHT = 500;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > MAX_WIDTH) {
                                height *= MAX_WIDTH / width;
                                width = MAX_WIDTH;
                            }
                        } else {
                            if (height > MAX_HEIGHT) {
                                width *= MAX_HEIGHT / height;
                                height = MAX_HEIGHT;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        const TaskItem = ({ task, isCompleted, toggleTask, deleteTask, attachImageToTask, removeImage, editTask }) => {
            const [isDraggingOver, setIsDraggingOver] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [editText, setEditText] = useState(task.text);
            const fileInputRef = useRef(null);

            const handleDrop = async (e) => {
                e.preventDefault();
                setIsDraggingOver(false);
                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const resized = await resizeImage(file);
                    attachImageToTask(task.id, resized);
                }
            };

            const handleFileSelect = async (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const resized = await resizeImage(file);
                    attachImageToTask(task.id, resized);
                }
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const handleSaveEdit = () => {
                setIsEditing(false);
                if (editText.trim() !== task.text) {
                    editTask(task.id, editText.trim() || 'Unbenannt');
                } else {
                    setEditText(task.text);
                }
            };

            const handleEditKeyDown = (e) => {
                if (e.key === 'Enter') {
                    handleSaveEdit();
                }
                if (e.key === 'Escape') {
                    setEditText(task.text);
                    setIsEditing(false);
                }
            };

            return (
                <div 
                    draggable={!isEditing}
                    onDragStart={(e) => {
                        if (!isEditing) {
                            e.dataTransfer.setData('application/json', JSON.stringify({ type: 'task', id: task.id }));
                        }
                    }}
                    onDragOver={(e) => { e.preventDefault(); setIsDraggingOver(true); }}
                    onDragLeave={() => setIsDraggingOver(false)}
                    onDrop={handleDrop}
                    className={`group flex flex-col p-2.5 rounded-lg bg-white/80 hover:bg-white transition-all border shadow-sm ${!isEditing ? 'cursor-grab active:cursor-grabbing' : ''} ${isCompleted ? 'border-neutral-200' : 'border-transparent'} ${isDraggingOver ? 'ring-2 ring-blue-400 bg-blue-50/50' : ''}`}
                >
                    <div className="flex items-start gap-2.5 w-full">
                        <button 
                            onClick={() => toggleTask(task.id)}
                            className={`flex-shrink-0 mt-0.5 transition-colors ${isCompleted ? 'text-green-500' : 'text-neutral-400 hover:text-neutral-600'}`}
                        >
                            {isCompleted ? <IconCheckCircle2 size={18} /> : <IconCircle size={18} />}
                        </button>
                        
                        <div className="flex-1 min-w-0">
                            {isEditing ? (
                                <input
                                    type="text"
                                    value={editText}
                                    onChange={(e) => setEditText(e.target.value)}
                                    onBlur={handleSaveEdit}
                                    onKeyDown={handleEditKeyDown}
                                    autoFocus
                                    className="w-full bg-white border border-blue-400 rounded px-1.5 py-0.5 text-sm text-neutral-800 outline-none"
                                />
                            ) : (
                                <span 
                                    onClick={() => setIsEditing(true)}
                                    className={`block w-full break-words text-sm leading-snug transition-all cursor-text hover:bg-neutral-50 px-1.5 py-0.5 rounded -ml-1.5 ${isCompleted ? 'text-neutral-400 line-through' : 'text-neutral-700'}`}
                                    title="Zum Bearbeiten klicken"
                                >
                                    {task.text}
                                </span>
                            )}
                        </div>

                        <div className="opacity-0 group-hover:opacity-100 flex items-center transition-all shrink-0 ml-1">
                            <button 
                                onClick={() => fileInputRef.current?.click()}
                                className="p-1 text-neutral-400 hover:text-blue-500 hover:bg-blue-50 rounded transition-all"
                                title="Bild anhängen"
                            >
                                <IconImage size={16} />
                            </button>
                            <button 
                                onClick={() => deleteTask(task.id)}
                                className="p-1 text-neutral-400 hover:text-red-500 hover:bg-red-50 rounded transition-all ml-1"
                                title="Aufgabe löschen"
                            >
                                <IconTrash2 size={16} />
                            </button>
                        </div>
                    </div>
                    
                    <input 
                        type="file" 
                        accept="image/*" 
                        className="hidden" 
                        ref={fileInputRef} 
                        onChange={handleFileSelect} 
                    />
                    
                    {task.image && (
                        <div className="mt-2 ml-7 relative group/image inline-block">
                            <img src={task.image} alt="Anhang" className="max-h-32 rounded border border-neutral-200 object-contain bg-white" />
                            <button 
                                onClick={() => removeImage(task.id)}
                                className="absolute -top-2 -right-2 bg-white text-neutral-500 hover:text-red-500 rounded-full shadow-md p-0.5 opacity-0 group-hover/image:opacity-100 transition-opacity border border-neutral-200"
                                title="Bild entfernen"
                            >
                                <IconX size={14} />
                            </button>
                        </div>
                    )}
                </div>
            );
        };

        const Quadrant = ({ id, title, subtitle, bgColor, borderColor, quadrantTasks, selectedKw, addTask, toggleTask, deleteTask, attachImageToTask, removeImage, moveTask, editTask }) => {
            const [inputValue, setInputValue] = useState('');
            const [isDraggingOverQuadrant, setIsDraggingOverQuadrant] = useState(false);
            const fileInputRef = useRef(null);

            const handleKeyDown = (e) => {
                if (e.key === 'Enter') {
                    addTask(id, inputValue);
                    setInputValue('');
                }
            };

            const handleFileSelect = async (e) => {
                const file = e.target.files[0];
                if (file && file.type.startsWith('image/')) {
                    const resized = await resizeImage(file);
                    addTask(id, inputValue, resized);
                    setInputValue('');
                }
                if (fileInputRef.current) fileInputRef.current.value = '';
            };

            const handleQuadrantDrop = async (e) => {
                e.preventDefault();
                setIsDraggingOverQuadrant(false);
                
                try {
                    const dataString = e.dataTransfer.getData('application/json');
                    if (dataString) {
                        const data = JSON.parse(dataString);
                        if (data.type === 'task') {
                            moveTask(data.id, id);
                            return;
                        }
                    }
                } catch (err) {
                    
                }

                const file = e.dataTransfer.files[0];
                if (file && file.type.startsWith('image/')) {
                    const resized = await resizeImage(file);
                    addTask(id, '', resized);
                }
            };

            return (
                <div 
                    onDragOver={(e) => { e.preventDefault(); setIsDraggingOverQuadrant(true); }}
                    onDragLeave={() => setIsDraggingOverQuadrant(false)}
                    onDrop={handleQuadrantDrop}
                    className={`flex flex-col h-full rounded-xl border-t-4 ${borderColor} ${bgColor} shadow-sm overflow-hidden transition-colors ${isDraggingOverQuadrant ? 'ring-2 ring-blue-400 bg-blue-50/50' : ''}`}
                >
                    <div className="p-3 border-b border-white/40">
                        <h2 className="text-base text-neutral-800">{title}</h2>
                        <p className="text-xs text-neutral-500 uppercase tracking-wider">{subtitle}</p>
                    </div>
                    
                    <div className="flex-1 p-3 space-y-2">
                        {quadrantTasks.length === 0 ? (
                            <div className="flex flex-col items-center justify-center h-full text-neutral-400 space-y-2 mt-4 opacity-60 pointer-events-none">
                                <IconImage size={24} />
                                <p className="text-xs text-center">Keine Aufgaben<br/>Bild hier ablegen</p>
                            </div>
                        ) : (
                            quadrantTasks.map(task => (
                                <TaskItem 
                                    key={task.id} 
                                    task={task} 
                                    isCompleted={task.endKw === selectedKw}
                                    toggleTask={toggleTask}
                                    deleteTask={deleteTask}
                                    attachImageToTask={attachImageToTask}
                                    removeImage={removeImage}
                                    editTask={editTask}
                                />
                            ))
                        )}
                    </div>

                    <div className="p-2.5 bg-white/40 border-t border-white/60 flex items-center gap-2">
                        <IconPlus size={18} className="text-neutral-400 ml-1 shrink-0" />
                        <input
                            type="text"
                            value={inputValue}
                            onChange={(e) => setInputValue(e.target.value)}
                            onKeyDown={handleKeyDown}
                            placeholder="Neue Aufgabe..."
                            className="flex-1 bg-transparent border-none focus:ring-0 text-neutral-700 text-sm placeholder-neutral-500 py-1.5 outline-none min-w-0"
                        />
                        <button 
                            onClick={() => fileInputRef.current?.click()}
                            className="p-1.5 text-neutral-400 hover:text-blue-500 hover:bg-blue-50 rounded-md transition-colors shrink-0"
                            title="Bild auswählen"
                        >
                            <IconImage size={18} />
                        </button>
                        <input 
                            type="file" 
                            accept="image/*" 
                            className="hidden" 
                            ref={fileInputRef} 
                            onChange={handleFileSelect} 
                        />
                    </div>
                </div>
            );
        };

        function App() {
            const currentKw = getISOWeek(new Date());
            const [selectedKw, setSelectedKw] = useState(currentKw);
            const [tasks, setTasks] = useState([]);
            const [isLoaded, setIsLoaded] = useState(false);
            const scrollRef = useRef(null);

            useEffect(() => {
                const saved = localStorage.getItem('matrix_tasks');
                if (saved) {
                    try {
                        setTasks(JSON.parse(saved));
                    } catch (e) {
                        console.error('Fehler beim Laden', e);
                    }
                }
                setIsLoaded(true);
            }, []);

            useEffect(() => {
                if (isLoaded) {
                    localStorage.setItem('matrix_tasks', JSON.stringify(tasks));
                }
            }, [tasks, isLoaded]);

            useEffect(() => {
                if (scrollRef.current) {
                    const activeElement = scrollRef.current.querySelector('[data-active="true"]');
                    if (activeElement) {
                        activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }, [isLoaded]);

            const addTask = (quadrant, text, image = null) => {
                if (!text.trim() && !image) return;
                const newTask = {
                    id: Date.now().toString(),
                    text: text.trim() || 'Bildaufgabe',
                    image: image,
                    quadrant,
                    startKw: selectedKw,
                    endKw: null
                };
                setTasks([...tasks, newTask]);
            };

            const editTask = (id, newText) => {
                setTasks(tasks.map(t => t.id === id ? { ...t, text: newText } : t));
            };

            const attachImageToTask = (taskId, imageBase64) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, image: imageBase64 } : t));
            };

            const removeImage = (taskId) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, image: null } : t));
            };

            const toggleTask = (id) => {
                setTasks(tasks.map(t => {
                    if (t.id !== id) return t;
                    if (t.endKw === selectedKw) {
                        return { ...t, endKw: null };
                    }
                    return { ...t, endKw: selectedKw };
                }));
            };

            const deleteTask = (id) => {
                setTasks(tasks.filter(t => t.id !== id));
            };

            const getTasksForQuadrant = (quadrantId) => {
                return tasks.filter(t => {
                    if (t.quadrant !== quadrantId) return false;
                    const startedInTime = t.startKw <= selectedKw;
                    const notFinishedBefore = t.endKw === null || t.endKw >= selectedKw;
                    return startedInTime && notFinishedBefore;
                });
            };

            const moveTask = (taskId, newQuadrantId) => {
                setTasks(tasks.map(t => t.id === taskId ? { ...t, quadrant: newQuadrantId } : t));
            };

            const weeks = Array.from({ length: 52 }, (_, i) => i + 1);

            const quadrantsConfig = [
                { id: 'q1', title: 'Priorität 1: Sofort erledigen', subtitle: 'Wichtig & Dringend', bgColor: 'bg-red-50/50', borderColor: 'border-red-400' },
                { id: 'q2', title: 'Priorität 2: Einplanen', subtitle: 'Wichtig & Nicht Dringend', bgColor: 'bg-blue-50/50', borderColor: 'border-blue-400' },
                { id: 'q3', title: 'Priorität 3: Delegieren / Verschieben', subtitle: 'Nicht Wichtig & Dringend', bgColor: 'bg-amber-50/50', borderColor: 'border-amber-400' },
                { id: 'q4', title: 'Priorität 4: Eliminieren', subtitle: 'Nicht Wichtig & Nicht Dringend', bgColor: 'bg-neutral-100/50', borderColor: 'border-neutral-300' }
            ];

            return (
                <div className="flex h-screen bg-neutral-100 font-sans text-neutral-800">
                    <div className="flex-1 flex flex-col overflow-y-auto relative">
                        <header className="sticky top-0 z-20 bg-white/95 backdrop-blur-sm border-b border-neutral-200 px-8 py-5 flex justify-between items-center shrink-0">
                            <div>
                                <h1 className="text-2xl text-neutral-800 tracking-tight">Aufgabenplanung</h1>
                                <p className="text-neutral-500 flex items-center gap-2 mt-1">
                                    <IconCalendarDays size={16} />
                                    Kalenderwoche {selectedKw}
                                </p>
                            </div>
                            
                            {selectedKw !== currentKw && (
                                <button 
                                    onClick={() => {
                                        setSelectedKw(currentKw);
                                        const activeElement = scrollRef.current?.querySelector(`[data-kw="${currentKw}"]`);
                                        if (activeElement) activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                    }}
                                    className="flex items-center gap-2 px-4 py-2 bg-neutral-100 hover:bg-neutral-200 text-neutral-700 rounded-lg transition-colors"
                                >
                                    <IconArrowLeft size={16} />
                                    Zurück zu KW {currentKw}
                                </button>
                            )}
                        </header>

                        <main className="p-6">
                            <div className="grid grid-cols-2 gap-6">
                                {quadrantsConfig.map(q => (
                                    <Quadrant 
                                        key={q.id}
                                        id={q.id} 
                                        title={q.title} 
                                        subtitle={q.subtitle} 
                                        bgColor={q.bgColor} 
                                        borderColor={q.borderColor} 
                                        quadrantTasks={getTasksForQuadrant(q.id)}
                                        selectedKw={selectedKw}
                                        addTask={addTask}
                                        toggleTask={toggleTask}
                                        deleteTask={deleteTask}
                                        attachImageToTask={attachImageToTask}
                                        removeImage={removeImage}
                                        moveTask={moveTask}
                                        editTask={editTask}
                                    />
                                ))}
                            </div>
                        </main>
                    </div>

                    <div className="w-72 bg-white border-l border-neutral-200 flex flex-col shrink-0 shadow-[-4px_0_15px_-3px_rgba(0,0,0,0.05)] z-10">
                        <div className="p-5 border-b border-neutral-200 shrink-0">
                            <h2 className="text-lg text-neutral-800 tracking-tight">Jahresübersicht</h2>
                            <p className="text-sm text-neutral-500 mt-1">Wähle eine Woche aus</p>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto p-3 space-y-1" ref={scrollRef}>
                            {weeks.map((week) => {
                                const isSelected = selectedKw === week;
                                const isCurrent = currentKw === week;
                                
                                return (
                                    <button
                                        key={week}
                                        data-kw={week}
                                        data-active={isSelected}
                                        onClick={() => setSelectedKw(week)}
                                        className={`w-full flex items-center justify-between px-4 py-3 rounded-lg transition-all
                                            ${isSelected ? 'bg-blue-50 text-blue-700 border border-blue-200 shadow-sm' : 'hover:bg-neutral-50 text-neutral-600 border border-transparent'}
                                        `}
                                    >
                                        <span className="flex items-center gap-3 text-base">
                                            KW {week}
                                        </span>
                                        {isCurrent && (
                                            <span className={`text-xs px-2 py-1 rounded-full uppercase tracking-wider ${isSelected ? 'bg-blue-200 text-blue-800' : 'bg-neutral-200 text-neutral-700'}`}>
                                                Aktuell
                                            </span>
                                        )}
                                    </button>
                                );
                            })}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
