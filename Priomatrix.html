<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrioMatrix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
    .dark ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); }
    @keyframes slideIn { from { transform: translateY(6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(16px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .anim-slide { animation: slideIn 0.18s ease-out; }
    .anim-toast { animation: slideUp 0.25s ease-out; }
    .anim-fade { animation: fadeIn 0.15s ease-out; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .lightbox-img { max-width: 90vw; max-height: 85vh; object-fit: contain; border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.5); }
    @keyframes zoomIn { from { transform: scale(0.88); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .anim-zoom { animation: zoomIn 0.2s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ── Icons ──────────────────────────────────────────────────────
    const PATHS = {
      check: ["M22 11.08V12a10 10 0 1 1-5.93-9.14","M22 4 12 14.01 9 11.01"],
      circle: "M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z",
      plus: "M12 5v14M5 12h14",
      trash: ["M3 6h18","M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2","M10 11v6M14 11v6"],
      cal: ["M8 2v4M16 2v4M3 10h18","M3 6a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6z","M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"],
      arrow: "M19 12H5m7 7-7-7 7-7",
      image: ["M21 9v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h10","M13 4h5v5","M13 4l5 5","M9 15l3-3 3 3"],
      x: "M18 6 6 18M6 6l12 12",
      dl: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
      ul: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
      moon: "M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z",
      sun: ["M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42","M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10z"],
      search: ["M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z","M21 21l-4.35-4.35"],
      note: ["M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z","M14 2v6h6","M16 13H8M16 17H8M10 9H8"],
      db: ["M12 2C6.48 2 2 4.24 2 7s4.48 5 10 5 10-2.24 10-5-4.48-5-10-5z","M2 7v5c0 2.76 4.48 5 10 5s10-2.24 10-5V7","M2 12v5c0 2.76 4.48 5 10 5s10-2.24 10-5v-5"],
      target: ["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z","M12 18a6 6 0 1 0 0-12 6 6 0 0 0 0 12z","M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"],
      copy: ["M20 9h-9a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2v-9a2 2 0 0 0-2-2z","M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"],
      alert: ["M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z","M12 8v4M12 16h.01"],
    };
    const Ic = ({ n, size = 16, cls = "" }) => {
      const d = PATHS[n]; if (!d) return null;
      return (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={cls}>
          {Array.isArray(d) ? d.map((p,i) => <path key={i} d={p}/>) : <path d={d}/>}
        </svg>
      );
    };

    // ── Utils ──────────────────────────────────────────────────────
    const getISOWeek = (date) => {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const day = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - day);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    };

    const resizeImage = (file) => new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const MAX = 600; let { width, height } = img;
          if (width > MAX || height > MAX) {
            if (width > height) { height = Math.round(height * MAX / width); width = MAX; }
            else { width = Math.round(width * MAX / height); height = MAX; }
          }
          const c = document.createElement('canvas');
          c.width = width; c.height = height;
          c.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(c.toDataURL('image/jpeg', 0.75));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });

    const fmtBytes = (b) => b < 1024 ? b + ' B' : b < 1048576 ? (b/1024).toFixed(1) + ' KB' : (b/1048576).toFixed(2) + ' MB';
    const storageSize = () => { try { return new Blob([localStorage.getItem('matrix_tasks')||'']).size; } catch { return 0; } };

    // ── Toast ──────────────────────────────────────────────────────
    const Toast = ({ toasts, dismiss }) => (
      <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 items-center pointer-events-none">
        {toasts.map(t => (
          <div key={t.id} className={`anim-toast flex items-center gap-3 px-4 py-2.5 rounded-2xl shadow-2xl text-sm font-medium pointer-events-auto
            ${t.type==='error' ? 'bg-red-600 text-white' : t.type==='success' ? 'bg-emerald-600 text-white' : 'bg-neutral-900 dark:bg-white text-white dark:text-neutral-900'}`}>
            <span>{t.message}</span>
            {t.action && (
              <button onClick={() => { t.action(); dismiss(t.id); }}
                className="underline underline-offset-2 opacity-75 hover:opacity-100 transition-opacity">
                {t.actionLabel || 'Rückgängig'}
              </button>
            )}
          </div>
        ))}
      </div>
    );

    // ── Lightbox ───────────────────────────────────────────────────
    const Lightbox = ({ src, onClose }) => {
      useEffect(() => {
        const fn = e => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', fn);
        return () => window.removeEventListener('keydown', fn);
      }, []);
      return (
        <div className="fixed inset-0 z-[200] bg-black/85 backdrop-blur-sm anim-fade flex items-center justify-center p-4 cursor-zoom-out"
          onClick={onClose}>
          <img src={src} className="lightbox-img anim-zoom" onClick={e=>e.stopPropagation()}/>
          <button onClick={onClose}
            className="absolute top-4 right-4 p-2 rounded-full bg-white/10 hover:bg-white/20 text-white transition-colors">
            <Ic n="x" size={20}/>
          </button>
        </div>
      );
    };

    // ── Search Overlay ─────────────────────────────────────────────
    const SearchOverlay = ({ tasks, onClose, onJump }) => {
      const [q, setQ] = useState('');
      const ref = useRef(null);
      useEffect(() => { ref.current?.focus(); }, []);

      const results = useMemo(() => {
        if (!q.trim()) return [];
        const lq = q.toLowerCase();
        return tasks.filter(t => t.text.toLowerCase().includes(lq) || (t.notes||'').toLowerCase().includes(lq));
      }, [q, tasks]);

      const qLabel = { q1:'Q1 · Sofort', q2:'Q2 · Einplanen', q3:'Q3 · Delegieren', q4:'Q4 · Eliminieren' };
      const qCls = { q1:'text-red-500', q2:'text-blue-500', q3:'text-amber-500', q4:'text-neutral-400' };

      return (
        <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm anim-fade flex items-start justify-center pt-24 px-4" onClick={onClose}>
          <div className="bg-white dark:bg-neutral-900 rounded-2xl shadow-2xl w-full max-w-lg border border-neutral-200 dark:border-neutral-700 overflow-hidden" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center gap-3 px-4 py-3 border-b border-neutral-100 dark:border-neutral-800">
              <Ic n="search" size={17} cls="text-neutral-400 shrink-0"/>
              <input ref={ref} value={q} onChange={e=>setQ(e.target.value)}
                placeholder="Aufgaben durchsuchen…"
                className="flex-1 bg-transparent outline-none text-neutral-800 dark:text-neutral-100 placeholder-neutral-400 text-sm"
                onKeyDown={e=>e.key==='Escape'&&onClose()}/>
              <kbd className="text-xs text-neutral-400 bg-neutral-100 dark:bg-neutral-800 px-2 py-0.5 rounded-lg font-mono">ESC</kbd>
            </div>
            <div className="max-h-80 overflow-y-auto">
              {q.trim() && results.length === 0 && (
                <div className="py-10 text-center text-sm text-neutral-400">Keine Treffer für „{q}"</div>
              )}
              {!q.trim() && (
                <div className="py-10 text-center text-sm text-neutral-400">
                  <Ic n="search" size={22} cls="mx-auto mb-2 opacity-30"/>
                  Suchbegriff eingeben…
                </div>
              )}
              {results.map(t => (
                <button key={t.id} onClick={()=>onJump(t)}
                  className="w-full flex items-start gap-3 px-4 py-3 hover:bg-neutral-50 dark:hover:bg-neutral-800 text-left border-b border-neutral-100 dark:border-neutral-800 last:border-0 transition-colors">
                  <span className={`mt-0.5 text-xs font-semibold shrink-0 ${qCls[t.quadrant]}`}>{qLabel[t.quadrant]}</span>
                  <div className="flex-1 min-w-0">
                    <p className={`text-sm text-neutral-700 dark:text-neutral-200 ${t.endKw?'line-through opacity-40':''}`}>{t.text}</p>
                    {t.notes && <p className="text-xs text-neutral-400 truncate mt-0.5">{t.notes}</p>}
                  </div>
                  <span className="text-xs text-neutral-400 shrink-0">KW {t.startKw}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    };

    // ── Backup Panel ───────────────────────────────────────────────
    const BackupPanel = ({ tasks, onImport, onClose, addToast }) => {
      const fileRef = useRef(null);
      const sz = storageSize();

      const doExport = () => {
        const payload = { version: 2, exportedAt: new Date().toISOString(), tasks };
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        const a = Object.assign(document.createElement('a'), {
          href: URL.createObjectURL(blob),
          download: `priomatrix-backup-${new Date().toISOString().slice(0,10)}.json`
        });
        a.click(); URL.revokeObjectURL(a.href);
        addToast({ type:'success', message:`${tasks.length} Aufgaben exportiert` });
      };

      const doImport = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
          try {
            const data = JSON.parse(ev.target.result);
            const list = Array.isArray(data) ? data : (data.tasks || []);
            if (!Array.isArray(list)) throw new Error();
            onImport(list);
            addToast({ type:'success', message:`${list.length} Aufgaben importiert` });
            onClose();
          } catch { addToast({ type:'error', message:'Ungültige Backup-Datei' }); }
        };
        reader.readAsText(file);
        if (fileRef.current) fileRef.current.value = '';
      };

      const doClear = () => {
        if (!confirm(`Alle ${tasks.length} Aufgaben wirklich löschen?`)) return;
        onImport([]);
        addToast({ type:'success', message:'Alle Daten gelöscht' });
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm anim-fade flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-white dark:bg-neutral-900 rounded-2xl shadow-2xl w-full max-w-sm border border-neutral-200 dark:border-neutral-700 overflow-hidden" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-neutral-100 dark:border-neutral-800">
              <div className="flex items-center gap-2">
                <Ic n="db" size={16} cls="text-neutral-500"/>
                <h2 className="font-semibold text-neutral-800 dark:text-neutral-100">Backup & Daten</h2>
              </div>
              <button onClick={onClose} className="p-1.5 rounded-xl hover:bg-neutral-100 dark:hover:bg-neutral-800 text-neutral-400 transition-colors">
                <Ic n="x" size={15}/>
              </button>
            </div>

            <div className="p-5 space-y-3">
              {/* Storage info */}
              <div className="bg-neutral-50 dark:bg-neutral-800 rounded-xl p-4">
                <p className="text-xs text-neutral-500 dark:text-neutral-400 font-medium uppercase tracking-wider mb-2">Lokaler Speicher</p>
                <div className="flex items-baseline gap-1.5 mb-2">
                  <span className="text-xl font-bold text-neutral-800 dark:text-neutral-100">{fmtBytes(sz)}</span>
                  <span className="text-xs text-neutral-400">/ ~5 MB</span>
                </div>
                <div className="h-1.5 bg-neutral-200 dark:bg-neutral-700 rounded-full overflow-hidden">
                  <div className="h-full bg-blue-500 rounded-full transition-all" style={{width:`${Math.min(sz/52428.8,100)}%`}}/>
                </div>
                <p className="text-xs text-neutral-400 mt-2">{tasks.length} Aufgaben gespeichert</p>
              </div>

              <button onClick={doExport}
                className="w-full flex items-center gap-3 px-4 py-3 bg-blue-500 hover:bg-blue-600 text-white rounded-xl font-medium text-sm transition-colors">
                <Ic n="dl" size={16}/> Als JSON exportieren
              </button>

              <button onClick={()=>fileRef.current?.click()}
                className="w-full flex items-center gap-3 px-4 py-3 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 text-neutral-700 dark:text-neutral-200 rounded-xl font-medium text-sm transition-colors">
                <Ic n="ul" size={16}/> Backup importieren
              </button>
              <input ref={fileRef} type="file" accept=".json" className="hidden" onChange={doImport}/>

              {tasks.length > 0 && (
                <button onClick={doClear}
                  className="w-full flex items-center gap-3 px-4 py-3 bg-red-50 dark:bg-red-900/20 hover:bg-red-100 dark:hover:bg-red-900/30 text-red-600 dark:text-red-400 rounded-xl font-medium text-sm transition-colors">
                  <Ic n="trash" size={16}/> Alle Daten löschen
                </button>
              )}
            </div>
          </div>
        </div>
      );
    };

    // ── Notes Modal ────────────────────────────────────────────────
    const NotesModal = ({ task, onSave, onClose }) => {
      const [notes, setNotes] = useState(task.notes || '');
      const ref = useRef(null);
      useEffect(() => { ref.current?.focus(); }, []);
      return (
        <div className="fixed inset-0 z-50 bg-black/50 backdrop-blur-sm anim-fade flex items-center justify-center p-4" onClick={onClose}>
          <div className="bg-white dark:bg-neutral-900 rounded-2xl shadow-2xl w-full max-w-md border border-neutral-200 dark:border-neutral-700 overflow-hidden" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-3.5 border-b border-neutral-100 dark:border-neutral-800">
              <p className="font-medium text-neutral-800 dark:text-neutral-100 truncate text-sm pr-4">{task.text}</p>
              <button onClick={onClose} className="p-1.5 rounded-xl hover:bg-neutral-100 dark:hover:bg-neutral-800 text-neutral-400 shrink-0 transition-colors">
                <Ic n="x" size={14}/>
              </button>
            </div>
            <div className="p-4">
              <textarea ref={ref} value={notes} onChange={e=>setNotes(e.target.value)}
                placeholder="Notizen, Details, Links…"
                className="w-full h-36 resize-none bg-neutral-50 dark:bg-neutral-800 border border-neutral-200 dark:border-neutral-700 rounded-xl p-3 text-sm text-neutral-700 dark:text-neutral-200 outline-none focus:border-blue-400 dark:focus:border-blue-500 placeholder-neutral-400 transition-colors"
                onKeyDown={e=>{ if(e.key==='Escape') onClose(); if(e.key==='Enter'&&e.metaKey){ onSave(notes); onClose(); }}}/>
              <div className="flex gap-2 mt-3">
                <button onClick={()=>{ onSave(notes); onClose(); }}
                  className="flex-1 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-xl text-sm font-medium transition-colors">
                  Speichern
                </button>
                <button onClick={onClose}
                  className="px-4 py-2 bg-neutral-100 dark:bg-neutral-800 hover:bg-neutral-200 dark:hover:bg-neutral-700 text-neutral-600 dark:text-neutral-300 rounded-xl text-sm transition-colors">
                  Abbrechen
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ── TaskItem ───────────────────────────────────────────────────
    const TaskItem = ({ task, isCompleted, toggleTask, deleteTask, attachImageToTask, removeImage, editTask, updateNotes, addToast }) => {
      const [dropOver, setDropOver] = useState(false);
      const [dragging, setDragging] = useState(false);
      const [editing, setEditing] = useState(false);
      const [editText, setEditText] = useState(task.text);
      const [showNotes, setShowNotes] = useState(false);
      const [lightbox, setLightbox] = useState(false);
      const fileRef = useRef(null);

      const handleDrop = async (e) => {
        e.preventDefault(); setDropOver(false);
        const file = e.dataTransfer.files[0];
        if (file?.type.startsWith('image/')) attachImageToTask(task.id, await resizeImage(file));
      };

      const handleFile = async (e) => {
        const file = e.target.files[0];
        if (file?.type.startsWith('image/')) attachImageToTask(task.id, await resizeImage(file));
        if (fileRef.current) fileRef.current.value = '';
      };

      const saveEdit = () => {
        setEditing(false);
        const t = editText.trim();
        if (t && t !== task.text) editTask(task.id, t);
        else setEditText(task.text);
      };

      const handleDelete = () => {
        const snap = { ...task };
        deleteTask(task.id);
        addToast({ message:'Aufgabe gelöscht', action:()=>editTask(null,null,snap), actionLabel:'Rückgängig' });
      };

      return (
        <>
          <div
            draggable={!editing}
            onDragStart={e => { if(editing) return; setDragging(true); e.dataTransfer.setData('application/json', JSON.stringify({type:'task',id:task.id})); }}
            onDragEnd={()=>setDragging(false)}
            onDragOver={e=>{ e.preventDefault(); setDropOver(true); }}
            onDragLeave={()=>setDropOver(false)}
            onDrop={handleDrop}
            className={`group flex flex-col p-2.5 rounded-xl border anim-slide transition-all
              bg-white dark:bg-neutral-800
              ${isCompleted ? 'border-neutral-200 dark:border-neutral-700 opacity-55' : 'border-neutral-200 dark:border-neutral-700 hover:border-neutral-300 dark:hover:border-neutral-600 hover:shadow-sm'}
              ${dropOver ? 'ring-2 ring-blue-400 border-blue-300 dark:border-blue-600' : ''}
              ${dragging ? 'opacity-25 scale-[0.97]' : ''}
              ${!editing ? 'cursor-grab active:cursor-grabbing' : ''}
            `}
          >
            <div className="flex items-start gap-2 w-full">
              <button onClick={()=>toggleTask(task.id)}
                className={`flex-shrink-0 mt-0.5 transition-colors rounded-full
                  ${isCompleted ? 'text-emerald-500' : 'text-neutral-300 dark:text-neutral-600 hover:text-neutral-500 dark:hover:text-neutral-400'}`}>
                <Ic n={isCompleted?'check':'circle'} size={16}/>
              </button>

              <div className="flex-1 min-w-0">
                {editing ? (
                  <input type="text" value={editText} autoFocus
                    onChange={e=>setEditText(e.target.value)}
                    onBlur={saveEdit}
                    onKeyDown={e=>{ if(e.key==='Enter') saveEdit(); if(e.key==='Escape'){ setEditText(task.text); setEditing(false); } }}
                    className="w-full bg-blue-50 dark:bg-blue-900/30 border border-blue-300 dark:border-blue-600 rounded-lg px-2 py-0.5 text-sm text-neutral-800 dark:text-neutral-100 outline-none"/>
                ) : (
                  <span onClick={()=>!isCompleted&&setEditing(true)}
                    className={`block w-full break-words text-sm leading-snug px-1 py-0.5 rounded-lg -ml-1 transition-colors
                      ${isCompleted ? 'text-neutral-400 dark:text-neutral-500 line-through cursor-default' : 'text-neutral-700 dark:text-neutral-200 cursor-text hover:bg-neutral-50 dark:hover:bg-neutral-700/50'}`}>
                    {task.text}
                    {task.notes && <Ic n="note" size={10} cls="inline ml-1 -mt-0.5 opacity-40"/>}
                  </span>
                )}
              </div>

              <div className="opacity-0 group-hover:opacity-100 flex items-center gap-0.5 shrink-0 transition-opacity">
                <button onClick={()=>setShowNotes(true)} title="Notiz" className="p-1 rounded-lg text-neutral-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors"><Ic n="note" size={13}/></button>
                <button onClick={()=>fileRef.current?.click()} title="Bild" className="p-1 rounded-lg text-neutral-400 hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30 transition-colors"><Ic n="image" size={13}/></button>
                <button onClick={handleDelete} title="Löschen" className="p-1 rounded-lg text-neutral-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 transition-colors"><Ic n="trash" size={13}/></button>
              </div>
            </div>

            <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile}/>

            {task.notes && !editing && (
              <p className="mt-1 ml-6 text-xs text-neutral-400 dark:text-neutral-500 line-clamp-2 leading-relaxed">{task.notes}</p>
            )}

            {task.image && (
              <div className="mt-2 ml-6 relative group/img inline-block">
                <img src={task.image} alt="" onClick={()=>setLightbox(true)}
                  className="max-h-40 rounded-xl border border-neutral-200 dark:border-neutral-700 object-contain cursor-zoom-in hover:opacity-90 transition-opacity"/>
                <button onClick={()=>removeImage(task.id)}
                  className="absolute -top-1.5 -right-1.5 bg-white dark:bg-neutral-800 text-neutral-400 hover:text-red-500 rounded-full shadow-md p-0.5 opacity-0 group-hover/img:opacity-100 transition-opacity border border-neutral-200 dark:border-neutral-700">
                  <Ic n="x" size={11}/>
                </button>
              </div>
            )}
          </div>

          {showNotes && <NotesModal task={task} onSave={n=>updateNotes(task.id,n)} onClose={()=>setShowNotes(false)}/>}
          {lightbox && task.image && <Lightbox src={task.image} onClose={()=>setLightbox(false)}/>}
        </>
      );
    };

    // ── Quadrant ───────────────────────────────────────────────────
    const Q_STYLE = {
      q1: { border:'border-red-400',   label:'Q1', badge:'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400',   accent:'text-red-500',   btn:'hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30' },
      q2: { border:'border-blue-400',  label:'Q2', badge:'bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400', accent:'text-blue-500', btn:'hover:text-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/30' },
      q3: { border:'border-amber-400', label:'Q3', badge:'bg-amber-100 dark:bg-amber-900/30 text-amber-600 dark:text-amber-400', accent:'text-amber-500', btn:'hover:text-amber-500 hover:bg-amber-50 dark:hover:bg-amber-900/30' },
      q4: { border:'border-neutral-300 dark:border-neutral-600', label:'Q4', badge:'bg-neutral-100 dark:bg-neutral-800 text-neutral-500', accent:'text-neutral-400', btn:'hover:text-neutral-500 hover:bg-neutral-100 dark:hover:bg-neutral-800' },
    };

    const Quadrant = ({ id, title, subtitle, tasks, selectedKw, addTask, ...rest }) => {
      const [input, setInput] = useState('');
      const [dropOver, setDropOver] = useState(false);
      const [focused, setFocused] = useState(false);
      const fileRef = useRef(null);
      const s = Q_STYLE[id];
      const done = tasks.filter(t=>t.endKw!==null).length;

      const doAdd = () => { if(input.trim()){ addTask(id,input); setInput(''); } };

      // Clipboard paste (Strg+V) when this quadrant's input is focused
      const handlePaste = async (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            e.preventDefault();
            const file = item.getAsFile();
            if (file) addTask(id, input, await resizeImage(file));
            return;
          }
        }
      };

      const handleDrop = async (e) => {
        e.preventDefault(); setDropOver(false);
        try {
          const d = JSON.parse(e.dataTransfer.getData('application/json'));
          if(d.type==='task'){ rest.moveTask(d.id, id); return; }
        } catch {}
        const file = e.dataTransfer.files[0];
        if(file?.type.startsWith('image/')) addTask(id, '', await resizeImage(file));
      };

      const handleFile = async (e) => {
        const file = e.target.files[0];
        if(file?.type.startsWith('image/')){ addTask(id, input, await resizeImage(file)); setInput(''); }
        if(fileRef.current) fileRef.current.value = '';
      };

      return (
        <div
          onDragOver={e=>{ e.preventDefault(); setDropOver(true); }}
          onDragLeave={e=>{ if(!e.currentTarget.contains(e.relatedTarget)) setDropOver(false); }}
          onDrop={handleDrop}
          className={`flex flex-col rounded-2xl border-t-4 ${s.border} bg-neutral-50 dark:bg-neutral-900/80 shadow-sm overflow-hidden transition-all
            ${dropOver ? 'ring-2 ring-blue-400 ring-offset-1 shadow-md' : ''}`}
        >
          {/* Header */}
          <div className="px-4 pt-3.5 pb-3 bg-white dark:bg-neutral-900 border-b border-neutral-100 dark:border-neutral-800 flex items-start justify-between gap-2 shrink-0">
            <div className="min-w-0">
              <p className="text-base font-semibold leading-tight mb-1.5">
                {subtitle.split(/(&)|(Wichtig)|(Nicht wichtig)|(Dringend)|(Nicht dringend)/g).filter(Boolean).map((word, i) => {
                  if (word === '&') return <span key={i} className="text-neutral-400 dark:text-neutral-500 mx-1">&</span>;
                  if (word === 'Wichtig') return <span key={i} className={`${s.accent}`}>Wichtig</span>;
                  if (word === 'Nicht wichtig') return <span key={i} className="text-neutral-400 dark:text-neutral-500">Nicht wichtig</span>;
                  if (word === 'Dringend') return <span key={i} className={`${s.accent}`}>Dringend</span>;
                  if (word === 'Nicht dringend') return <span key={i} className="text-neutral-400 dark:text-neutral-500">Nicht dringend</span>;
                  return <span key={i}>{word}</span>;
                })}
              </p>
              <h2 className="text-xs font-medium text-neutral-400 dark:text-neutral-500 uppercase tracking-wider">{title}</h2>
            </div>
            {tasks.length > 0 && (
              <span className={`shrink-0 text-xs font-semibold px-2 py-0.5 rounded-full ${s.badge}`}>
                {done>0 ? `${done}/${tasks.length}` : tasks.length}
              </span>
            )}
          </div>

          {/* Task list */}
          <div className="flex-1 p-3 space-y-2 overflow-y-auto">
            {tasks.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-10 text-neutral-300 dark:text-neutral-700 gap-2">
                <Ic n="target" size={26}/>
                <p className="text-xs text-center leading-relaxed opacity-80">Keine Aufgaben<br/>Drag & Drop oder unten eingeben</p>
              </div>
            ) : tasks.map(t => (
              <TaskItem key={t.id} task={t} isCompleted={t.endKw!==null}
                addTask={addTask} {...rest}/>
            ))}
          </div>

          {/* Input */}
          <div className="px-3 py-2.5 bg-white dark:bg-neutral-900 border-t border-neutral-100 dark:border-neutral-800 flex items-center gap-1.5 shrink-0">
            <button onClick={doAdd} className={`p-1 rounded-lg ${s.accent} ${s.btn} transition-colors shrink-0`}>
              <Ic n="plus" size={16}/>
            </button>
            <input value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doAdd()}
              onPaste={handlePaste}
              onFocus={()=>setFocused(true)}
              onBlur={()=>setFocused(false)}
              placeholder={focused ? "Neue Aufgabe… (Bild einfügen mit Strg+V)" : "Neue Aufgabe…"}
              className="flex-1 bg-transparent text-sm text-neutral-700 dark:text-neutral-200 placeholder-neutral-400 dark:placeholder-neutral-600 outline-none min-w-0 py-1"/>
            <button onClick={()=>fileRef.current?.click()} title="Bild" className={`p-1 rounded-lg text-neutral-400 ${s.btn} transition-colors shrink-0`}>
              <Ic n="image" size={15}/>
            </button>
            <input ref={fileRef} type="file" accept="image/*" className="hidden" onChange={handleFile}/>
          </div>
        </div>
      );
    };

    // ── Week Sidebar ───────────────────────────────────────────────
    const WeekSidebar = ({ selectedKw, currentKw, tasks, onSelect, scrollRef }) => {
      const weekStats = useMemo(() => {
        const map = {};
        for (let w = 1; w <= 52; w++) {
          const visible = tasks.filter(t => t.startKw <= w && (t.endKw === null || t.endKw >= w));
          map[w] = { total: visible.length, done: tasks.filter(t => t.endKw === w).length };
        }
        return map;
      }, [tasks]);

      return (
        <div className="w-56 bg-white dark:bg-neutral-900 border-l border-neutral-200 dark:border-neutral-800 flex flex-col shrink-0">
          <div className="px-4 py-3.5 border-b border-neutral-100 dark:border-neutral-800 shrink-0">
            <p className="text-xs font-semibold text-neutral-600 dark:text-neutral-300">Jahresübersicht</p>
            <p className="text-xs text-neutral-400 mt-0.5">{new Date().getFullYear()}</p>
          </div>
          <div className="flex-1 overflow-y-auto p-2" ref={scrollRef}>
            {Array.from({length:52},(_,i)=>i+1).map(w => {
              const sel = selectedKw===w, cur = currentKw===w;
              const { total, done } = weekStats[w] || {};
              return (
                <button key={w} data-kw={w} data-active={sel} onClick={()=>onSelect(w)}
                  className={`w-full flex items-center justify-between px-3 py-1.5 rounded-xl mb-0.5 text-left transition-all
                    ${sel ? 'bg-blue-500 text-white shadow-sm' : cur ? 'bg-neutral-100 dark:bg-neutral-800 text-neutral-700 dark:text-neutral-200' : 'text-neutral-500 dark:text-neutral-500 hover:bg-neutral-50 dark:hover:bg-neutral-800/60 hover:text-neutral-700 dark:hover:text-neutral-300'}`}>
                  <div className="flex items-center gap-1.5">
                    <span className="text-sm font-medium">KW {w}</span>
                    {cur && !sel && <span className="w-1.5 h-1.5 rounded-full bg-blue-400"/>}
                  </div>
                  <div className="flex items-center gap-1.5">
                    {total > 0 && (
                      <span className={`text-xs ${sel ? 'text-blue-100' : 'text-neutral-400 dark:text-neutral-600'}`}>
                        {done>0 ? `${done}/${total}` : total}
                      </span>
                    )}
                    {cur && sel && <span className="text-xs bg-white/20 text-white px-1.5 py-0.5 rounded-full">Jetzt</span>}
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      );
    };

    // ── App ────────────────────────────────────────────────────────
    function App() {
      const currentKw = getISOWeek(new Date());
      const [selectedKw, setSelectedKw] = useState(currentKw);
      const [tasks, setTasks] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const [dark, setDark] = useState(false);
      const [showSearch, setShowSearch] = useState(false);
      const [showBackup, setShowBackup] = useState(false);
      const [toasts, setToasts] = useState([]);
      const scrollRef = useRef(null);

      // Load
      useEffect(() => {
        try { const s = localStorage.getItem('matrix_tasks'); if(s) setTasks(JSON.parse(s)); } catch {}
        const dm = localStorage.getItem('matrix_dark') === 'true';
        setDark(dm);
        setLoaded(true);
      }, []);

      // Persist tasks
      useEffect(() => { if(loaded) localStorage.setItem('matrix_tasks', JSON.stringify(tasks)); }, [tasks, loaded]);

      // Dark mode
      useEffect(() => {
        localStorage.setItem('matrix_dark', dark);
        document.documentElement.classList.toggle('dark', dark);
      }, [dark]);

      // Scroll to current KW on load
      useEffect(() => {
        if(!loaded) return;
        const el = scrollRef.current?.querySelector(`[data-kw="${currentKw}"]`);
        if(el) el.scrollIntoView({behavior:'smooth',block:'center'});
      }, [loaded]);

      // Keyboard shortcuts
      useEffect(() => {
        const fn = e => {
          if((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); setShowSearch(s=>!s); }
          if(e.key==='Escape') { setShowSearch(false); setShowBackup(false); }
        };
        window.addEventListener('keydown', fn);
        return () => window.removeEventListener('keydown', fn);
      }, []);

      const addToast = useCallback(({ message, type='default', action, actionLabel }) => {
        const id = Date.now();
        setToasts(t => [...t, {id, message, type, action, actionLabel}]);
        setTimeout(() => setToasts(t => t.filter(x=>x.id!==id)), 4500);
      }, []);
      const dismissToast = useCallback(id => setToasts(t=>t.filter(x=>x.id!==id)), []);

      // Task ops
      const addTask = (quadrant, text, image=null) => {
        if(!text.trim() && !image) return;
        setTasks(prev => [...prev, { id:Date.now().toString(), text:text.trim()||'Bildaufgabe', image, notes:'', quadrant, startKw:selectedKw, endKw:null }]);
      };

      const editTask = (id, newText, restore=null) => {
        if(restore) { setTasks(prev => [...prev, restore]); return; }
        setTasks(prev => prev.map(t => t.id===id ? {...t, text:newText} : t));
      };

      const updateNotes = (id, notes) => setTasks(prev => prev.map(t => t.id===id ? {...t, notes} : t));
      const attachImageToTask = (id, img) => setTasks(prev => prev.map(t => t.id===id ? {...t,image:img} : t));
      const removeImage = (id) => setTasks(prev => prev.map(t => t.id===id ? {...t,image:null} : t));
      const toggleTask = (id) => setTasks(prev => prev.map(t => t.id!==id ? t : t.endKw!==null ? {...t,endKw:null} : {...t,endKw:selectedKw}));
      const deleteTask = (id) => setTasks(prev => prev.filter(t => t.id!==id));
      const moveTask = (taskId, qId) => setTasks(prev => prev.map(t => t.id===taskId ? {...t,quadrant:qId} : t));

      const getQ = (qId) => tasks.filter(t =>
        t.quadrant===qId && t.startKw<=selectedKw && (t.endKw===null || t.endKw>=selectedKw)
      );

      // Stats
      const weekTasks = tasks.filter(t => t.startKw<=selectedKw && (t.endKw===null||t.endKw>=selectedKw));
      const doneCount = tasks.filter(t=>t.endKw===selectedKw).length;
      const openCount = weekTasks.length - doneCount;

      const taskProps = { toggleTask, deleteTask, attachImageToTask, removeImage, moveTask, editTask, updateNotes, addToast };

      const QUADS = [
        {id:'q1', title:'Sofort erledigen',  subtitle:'Wichtig & Dringend'},
        {id:'q2', title:'Einplanen',          subtitle:'Wichtig & Nicht dringend'},
        {id:'q3', title:'Delegieren',         subtitle:'Nicht wichtig & Dringend'},
        {id:'q4', title:'Eliminieren',        subtitle:'Nicht wichtig & Nicht dringend'},
      ];

      return (
        <div className="flex h-screen bg-neutral-100 dark:bg-neutral-950 font-sans overflow-hidden">
          <div className="flex-1 flex flex-col overflow-hidden">

            {/* Header */}
            <header className="shrink-0 bg-white dark:bg-neutral-900 border-b border-neutral-200 dark:border-neutral-800 px-5 py-3 flex items-center gap-3 z-20">
              {/* Logo */}
              <div className="flex items-center gap-2 shrink-0">
                <div className="w-7 h-7 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-sm">
                  <Ic n="target" size={14} cls="text-white"/>
                </div>
                <span className="font-bold text-neutral-800 dark:text-neutral-100 tracking-tight">PrioMatrix</span>
              </div>

              <div className="w-px h-5 bg-neutral-200 dark:bg-neutral-700 shrink-0"/>

              {/* Week info */}
              <div className="flex items-center gap-2 text-sm text-neutral-500 dark:text-neutral-400 shrink-0">
                <Ic n="cal" size={14}/>
                <span className="font-semibold text-neutral-700 dark:text-neutral-200">KW {selectedKw}</span>
                {selectedKw===currentKw && <span className="text-xs px-2 py-0.5 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-full font-medium">Aktuell</span>}
              </div>

              <div className="flex-1"/>

              {/* Stats */}
              {weekTasks.length > 0 && (
                <div className="hidden sm:flex items-center gap-3 text-xs mr-2">
                  <span className="text-neutral-400">{weekTasks.length} Aufgaben</span>
                  {openCount>0 && <span className="font-medium text-neutral-600 dark:text-neutral-300">{openCount} offen</span>}
                  {doneCount>0 && <span className="font-medium text-emerald-600 dark:text-emerald-400">{doneCount} erledigt</span>}
                </div>
              )}

              {/* Actions */}
              <div className="flex items-center gap-1">
                <button onClick={()=>setShowSearch(true)} title="Suchen (Strg+K)"
                  className="flex items-center gap-1.5 px-2.5 py-1.5 text-sm text-neutral-500 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-xl transition-colors">
                  <Ic n="search" size={15}/>
                  <span className="hidden md:inline text-xs">Suchen</span>
                  <kbd className="hidden md:inline text-xs bg-neutral-100 dark:bg-neutral-800 px-1.5 py-0.5 rounded-lg font-mono text-neutral-400">⌘K</kbd>
                </button>

                {selectedKw!==currentKw && (
                  <button onClick={()=>{ setSelectedKw(currentKw); scrollRef.current?.querySelector(`[data-kw="${currentKw}"]`)?.scrollIntoView({behavior:'smooth',block:'center'}); }}
                    className="flex items-center gap-1.5 px-3 py-1.5 text-sm bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 hover:bg-blue-100 dark:hover:bg-blue-900/40 rounded-xl transition-colors font-medium">
                    <Ic n="arrow" size={13}/> KW {currentKw}
                  </button>
                )}

                <button onClick={()=>setShowBackup(true)} title="Backup & Daten"
                  className="p-2 text-neutral-500 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-xl transition-colors">
                  <Ic n="db" size={15}/>
                </button>

                <button onClick={()=>setDark(d=>!d)} title={dark?'Heller Modus':'Dunkler Modus'}
                  className="p-2 text-neutral-500 dark:text-neutral-400 hover:bg-neutral-100 dark:hover:bg-neutral-800 rounded-xl transition-colors">
                  <Ic n={dark?'sun':'moon'} size={15}/>
                </button>
              </div>
            </header>

            {/* Matrix grid */}
            <main className="flex-1 overflow-y-auto p-4">
              <div className="grid grid-cols-2 gap-4 h-full min-h-[480px]">
                {QUADS.map(q => (
                  <Quadrant key={q.id} id={q.id} title={q.title} subtitle={q.subtitle}
                    tasks={getQ(q.id)} selectedKw={selectedKw} addTask={addTask} {...taskProps}/>
                ))}
              </div>
            </main>
          </div>

          {/* Sidebar */}
          <WeekSidebar selectedKw={selectedKw} currentKw={currentKw} tasks={tasks} onSelect={setSelectedKw} scrollRef={scrollRef}/>

          {/* Overlays */}
          {showSearch && (
            <SearchOverlay tasks={tasks} onClose={()=>setShowSearch(false)}
              onJump={t=>{ setSelectedKw(t.startKw); setShowSearch(false); }}/>
          )}
          {showBackup && (
            <BackupPanel tasks={tasks} onImport={setTasks} onClose={()=>setShowBackup(false)} addToast={addToast}/>
          )}

          <Toast toasts={toasts} dismiss={dismissToast}/>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
